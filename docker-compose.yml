services:

  python-service:
    build:
      # Root is the build context so the Dockerfile can reach readscore/ and pyproject.toml.
      context: .
      dockerfile: python-service/Dockerfile
    # Not exposed on the host — only reachable by node-api inside the compose network.
    expose:
      - "${PYTHON_PORT:-8000}"
    env_file:
      - path: .env
        required: false   # allow running without a .env file (CI, Railway, etc.)
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:${PYTHON_PORT:-8000}/health')"
      interval: 30s
      timeout: 10s
      retries: 5
      # Whisper model download on first start can be slow.
      start_period: 120s

  node-api:
    build:
      context: .
      dockerfile: node-api/Dockerfile
    ports:
      - "${NODE_PORT:-3000}:${NODE_PORT:-3000}"
    env_file:
      - path: .env
        required: false   # allow running without a .env file (CI, Railway, etc.)
    depends_on:
      python-service:
        condition: service_healthy
